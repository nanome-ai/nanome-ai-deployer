services:
  mara-ai:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/mara-enterprise:latest
    pull_policy: always
    stop_grace_period: 1s
    environment:
      - VIRTUAL_PORT=8000
      - CHROMA_URL=mara-embeddings
      - CHROMA_PORT=8002
      - DB_FILE=/data/data.db
      - FILES_DIR=/data/files
    env_file: .env.maraserver
    depends_on:
      - mara-embeddings
      - mara-tool-server
    volumes:
      - mara-ai-volume:/data
    networks:
      - nanome-ai-network
    ports:
      - 8000
  mara-embeddings:
    image: chromadb/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_HOST_PORT=8002
      - PERSIST_DIRECTORY=/data/chroma
    volumes:
      - mara-embeddings-volume:/data
    networks:
      - nanome-ai-network
    ports:
      - '8002'
  mara-tool-server:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/mara-tool-server-enterprise:latest
    pull_policy: always
    stop_grace_period: 1s
    env_file: .env.toolserver
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mara-tool-volume:/data
    networks:
      - nanome-ai-network
    ports:
      - 8001
  nginx-proxy:
    image: jwilder/nginx-proxy:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro # Required for nginx-proxy to access container metadata
      - ./nginx_custom.conf:/etc/nginx/conf.d/custom.conf:ro
    networks:
      - nanome-ai-network

networks:
  nanome-ai-network:
    driver: bridge

volumes:
  mara-ai-volume:
  mara-embeddings-volume:
  mara-tool-volume:
