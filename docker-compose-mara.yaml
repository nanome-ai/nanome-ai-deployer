services:
  mara-ai:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/mara-enterprise:latest
    pull_policy: always
    stop_grace_period: 1s
    environment:
      - VIRTUAL_PORT=8000
      - CHROMA_URL=mara-embeddings
      - CHROMA_PORT=8002
      - DB_FILE=/data/data.db
      - FILES_DIR=/data/files
    env_file: .env.maraserver
    depends_on:
      mara-embeddings:
        condition: service_started
      mara-tool-server:
        condition: service_healthy
      mara-hf-tei:
        condition: service_healthy
        required: false
    volumes:
      - mara-ai-volume:/data
      - ./certs:/certs:ro
    networks:
      - nanome-ai-network
    ports:
      - 8000
    # Slim images don't ship curl/wget, but python+urllib are present.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/info',timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
  mara-embeddings:
    image: chromadb/chroma:0.6.3
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_HOST_PORT=8002
      - PERSIST_DIRECTORY=/data/chroma
    volumes:
      - mara-embeddings-volume:/data
    networks:
      - nanome-ai-network
    ports:
      - '8002'
  mara-tool-server:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/mara-tool-server-enterprise:latest
    pull_policy: always
    stop_grace_period: 1s
    env_file: .env.toolserver
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mara-tool-volume:/data
      - ./certs:/certs:ro
    networks:
      - nanome-ai-network
    ports:
      - 8001
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/',timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
  mara-hf-tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    profiles: ["local-embeddings"]
    command: ["--model-id", "${TEI_MODEL_ID:-BAAI/bge-large-en-v1.5}", "--max-client-batch-size", "512"]
    volumes:
      - mara-hf-tei-volume:/data
    networks:
      - nanome-ai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 600s
  nginx-proxy:
    image: jwilder/nginx-proxy:1.6.4
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro # Required for nginx-proxy to access container metadata
      - ./nginx_custom.conf:/etc/nginx/conf.d/custom.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - nanome-ai-network

networks:
  nanome-ai-network:
    driver: bridge

volumes:
  mara-ai-volume:
  mara-embeddings-volume:
  mara-hf-tei-volume:
  mara-tool-volume:
