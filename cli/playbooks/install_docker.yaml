- name: Install Docker on Amazon Linux EC2
  hosts: mara-servers
  become: true
  tasks:
    - name: Check if Docker is installed
      command: "docker --version"
      register: docker_installed
      ignore_errors: yes

    - name: Update the system packages
      yum:
        name: "*"
        state: latest
      when:
        - docker_installed.rc != 0
        - ansible_os_family == "RedHat"

    - name: Update apt cache on Debian-based systems
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install prerequisites on Debian-based systems
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common
      when:
        - ansible_os_family == "Debian"
        - docker_installed.rc is defined and docker_installed.rc != 0
    - name: Add Docker GPG key and repository on Debian-based systems
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when:
        - ansible_os_family == "Debian"
        - docker_installed.rc is defined and docker_installed.rc != 0
    - name: Add Docker repository on Debian-based systems
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
      when:
        - ansible_os_family == "Debian"
        - docker_installed.rc is defined and docker_installed.rc != 0
    - name: Install Docker on Debian-based systems
      ansible.builtin.apt:
        name: docker-ce
        state: present
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - docker_installed.rc is defined and docker_installed.rc != 0
    - name: Install Docker on Redhat
      yum:
        name: docker
        state: present
      when:
        - docker_installed.rc != 0
        - ansible_os_family == "RedHat"

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true
      # when: docker_installed.rc != 0

    - name: Add the ansible_user to the docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      # when: docker_installed.rc != 0

    - name: Print Docker version
      debug:
        msg: "Docker is installed: {{ docker_installed.stdout }}"

    - name: Check if Docker Compose is installed
      command: "docker compose version"
      register: docker_compose_installed
      ignore_errors: yes

    - name: Install Docker Compose (if missing)
      when: docker_compose_installed.rc != 0
      block:
        - name: Make cli-plugins directory
          file:
            path: /usr/libexec/docker/cli-plugins
            state: directory

        - name: Download Docker Compose
          get_url:
            url: "https://github.com/docker/compose/releases/latest/download/docker-compose-{{ ansible_system | lower }}-{{ ansible_architecture }}"
            dest: /usr/libexec/docker/cli-plugins/docker-compose
            mode: '0755'

    - name: Print Docker Compose version
      command: "docker compose version"
      register: docker_compose_version
      changed_when: false
      ignore_errors: yes

    - name: Debug Docker Compose version
      debug:
        msg: "Docker Compose is installed: {{ docker_compose_version.stdout }}"

    - name: Reset SSH connection
      meta: reset_connection
