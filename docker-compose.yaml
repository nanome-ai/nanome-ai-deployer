include:
  - docker-compose-mara.yaml
services:
  workspace-api:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/workspace-api:latest
    pull_policy: always
    environment:
      - VIRTUAL_PORT=8002
      - PORT=8002
      - AUTH_API=https://api.nanome.ai
      - DB_HOST=workspace-db
      - DB_OLD_PATH=/data/workspace-api.db
      - ENV=dev
    env_file: .env.workspaces
    networks:
      - nanome-ai-network
    ports:
      - 8002
    volumes:
      - workspace-api-volume:/data
  workspace-db:
    image: postgres:17
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=nanome
      - POSTGRES_PASSWORD=nanonano
    networks:
      - nanome-ai-network
    ports:
      - 5432
    volumes:
      - workspace-db-volume:/var/lib/postgresql/data
  nanome-auth-proxy:
    image: 441665557124.dkr.ecr.us-west-1.amazonaws.com/nanome-auth-proxy:latest
    pull_policy: always
    environment:
      - VIRTUAL_PORT=8004
      - PORT=8004
      - HTTPS=false
    env_file:
      - .env.auth_proxy
    networks:
      - nanome-ai-network
    ports:
      - 8004
volumes:
  workspace-api-volume:
  workspace-db-volume:
