---
- name: Configure AWS CLI using aws configure command
  hosts: mara-servers,windows
  tasks:
    - name: Install AWS CLI if not installed
      yum:
        name: aws-cli
        state: present
      when: ansible_os_family == "RedHat"

    - name: Run aws configure (Linux)
      shell: |
        aws configure set aws_access_key_id {{ aws_access_key }} --profile default
        aws configure set aws_secret_access_key {{ aws_secret_key }} --profile default
        aws configure set region {{ region }} --profile default
      become_user: "{{ ansible_user }}"
      when: ansible_os_family != "Windows"

    - name: Run aws configure (Windows)
      win_shell: |
        aws configure set aws_access_key_id {{ aws_access_key }} --profile default
        aws configure set aws_secret_access_key {{ aws_secret_key }} --profile default
        aws configure set region {{ region }} --profile default
      when: ansible_os_family == "Windows"

    - name: Verify AWS CLI configuration
      shell: aws sts get-caller-identity
      register: aws_identity
      become_user: "{{ ansible_user }}"

    - name: Print AWS CLI identity
      debug:
        msg: "AWS CLI is configured. Caller identity: {{ aws_identity.stdout }}"
